<!DOCTYPE html>
<html>
<head>
<title>Historial</title>
<link rel="stylesheet" href="estilo.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

function cargar(){

let lista=JSON.parse(localStorage.getItem("docs"))||[];

let tabla=document.getElementById("tabla");

tabla.innerHTML="";

let fila=tabla.insertRow();
fila.innerHTML="<th>N°</th><th>Fecha</th><th>Tipo</th><th>Remitente</th><th>Estado</th><th>QR</th>";

for(let i=0;i<lista.length;i++){

let doc=lista[i];

let f=tabla.insertRow();

f.insertCell(0).innerText=doc.numero;
f.insertCell(1).innerText=doc.fecha;
f.insertCell(2).innerText=doc.tipo;
f.insertCell(3).innerText=doc.remitente;
f.insertCell(4).innerText=doc.estado;

// QR
let celda=f.insertCell(5);
let div=document.createElement("div");
celda.appendChild(div);

new QRCode(div, doc.qr);

}

}

</script>

</head>

<body onload="cargar()">

<div class="container">

<h2>Historial</h2>

<table id="tabla"></table>

<a href="panel.html">Volver</a>

</div>

</body>
</html>
